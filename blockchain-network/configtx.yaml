Organizations:

  - &OrdererOrg
    Name: OrdererMSP
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/landregistry.com/msp

    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"

  - &Org1
    Name: Org1MSP
    ID: Org1MSP
    MSPDir: crypto-config/peerOrganizations/org1.landregistry.com/msp

    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org1MSP.admin','Org1MSP.peer','Org1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org1MSP.admin','Org1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org1MSP.admin')"

    AnchorPeers:
      - Host: peer0.org1.landregistry.com
        Port: 7051


  - &Org2
    Name: Org2MSP
    ID: Org2MSP
    MSPDir: crypto-config/peerOrganizations/org2.landregistry.com/msp

    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org2MSP.admin','Org2MSP.peer','Org2MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org2MSP.admin','Org2MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org2MSP.admin')"

    AnchorPeers:
      - Host: peer0.org2.landregistry.com
        Port: 9051

Orderer: &OrdererDefaults

  OrdererType: etcdraft

  Addresses:
    - orderer0.landregistry.com:7050
    - orderer1.landregistry.com:8050
    - orderer2.landregistry.com:9050

  BatchTimeout: 2s

  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB

  Policies:
    Readers:
      Type: Signature
      Rule: "OR('OrdererMSP.member')"

    Writers:
      Type: Signature
      Rule: "OR('OrdererMSP.member')"

    Admins:
      Type: Signature
      Rule: "OR('OrdererMSP.admin')"

    BlockValidation:
      Type: Signature
      Rule: "OR('OrdererMSP.member')"

  EtcdRaft:

    Consenters:

      - Host: orderer0.landregistry.com
        Port: 7050
        ClientTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer0.landregistry.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer0.landregistry.com/tls/server.crt

      - Host: orderer1.landregistry.com
        Port: 8050
        ClientTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer1.landregistry.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer1.landregistry.com/tls/server.crt

      - Host: orderer2.landregistry.com
        Port: 9050
        ClientTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer2.landregistry.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer2.landregistry.com/tls/server.crt

Application: &ApplicationDefaults

  Organizations:

  Policies:

    Readers:
      Type: Signature
      Rule: "OR('Org1MSP.member','Org2MSP.member')"

    Writers:
      Type: Signature
      Rule: "OR('Org1MSP.member','Org2MSP.member')"

    Admins:
      Type: Signature
      Rule: "OR('Org1MSP.admin','Org2MSP.admin')"

Profiles:

  Genesis:

    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg

    Consortiums:

      LandConsortium:
        Organizations:
          - *Org1
          - *Org2

    Policies:

      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member','Org1MSP.member','Org2MSP.member')"

      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member','Org1MSP.member','Org2MSP.member')"

      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin','Org1MSP.admin','Org2MSP.admin')"


  LandChannel:

    Consortium: LandConsortium

    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Org1
        - *Org2